apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-llm-worker
  namespace: development
  labels:
    app: ordering-llm-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordering-llm-worker
  template:
    metadata:
      labels:
        app: ordering-llm-worker
    spec:
      containers:
      - name: llm-worker
        image: edwardoz/ordering-llm-worker:development-latest # We will target your local image build later
        imagePullPolicy: IfNotPresent
        env:
        - name: DOTNET_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"

        # ConfigMap Variables
        - name: MessageBroker__Host
          valueFrom:
            configMapKeyRef:
              name: llm-worker-config
              key: MessageBroker__Host
        - name: Ollama__Endpoint
          valueFrom:
            configMapKeyRef:
              name: llm-worker-config
              key: Ollama__Endpoint
        - name: Ollama__Model
          valueFrom:
            configMapKeyRef:
              name: llm-worker-config
              key: Ollama__Model
        - name: ConnectionStrings__Redis
          valueFrom:
            configMapKeyRef:
              name: llm-worker-config
              key: ConnectionStrings__Redis

        # Secret Variables (Pointing to local development secrets)
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: llm-worker-secret
              key: ConnectionStrings__DefaultConnection
        - name: MessageBroker__Password
          valueFrom:
            secretKeyRef:
              name: llm-worker-secret
              key: MessageBroker__Password