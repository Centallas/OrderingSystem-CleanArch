apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-llm-worker
  namespace: staging
  labels:
    app: ordering-llm-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordering-llm-worker
  template:
    metadata:
      labels:
        app: ordering-llm-worker
    spec:
      containers:
      - name: llm-worker 
        image: edwardoz/ordering-llm-worker:staging-v2        
        imagePullPolicy: Always
        env:
        # Generic .NET Host Environment Flag
        - name: DOTNET_ENVIRONMENT
          value: "Staging"
        # Keep this one too just to ensure complete alignment across shared internal libraries        
        - name: ASPNETCORE_ENVIRONMENT  # Explicit Hosting Environment Flag
          value: "Staging"
          
        # ConfigMap Variables
        - name: MessageBroker__Host
          valueFrom:
            configMapKeyRef:
              name: llm-worker-config
              key: MessageBroker__Host
        - name: Ollama__Endpoint
          valueFrom:
            configMapKeyRef:
              name: llm-worker-config
              key: Ollama__Endpoint
        - name: Ollama__Model
          valueFrom:
            configMapKeyRef:
              name: llm-worker-config
              key: Ollama__Model
              
        # Secret Variables
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: llm-worker-secret
              key: ConnectionStrings__DefaultConnection
        - name: MessageBroker__Password
          valueFrom:
            secretKeyRef:
              name: llm-worker-secret
              key: MessageBroker__Password