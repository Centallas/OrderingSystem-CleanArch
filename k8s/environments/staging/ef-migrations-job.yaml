apiVersion: batch/v1
kind: Job
metadata:
  name: ordering-db-migration
  namespace: staging
  annotations:
    # Runs migrations completely BEFORE the new API/Worker roll out
    argocd.argoproj.io/hook: PreSync
    # Deletes the previous job pod automatically before creating a new one to prevent name collisions
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    metadata:
      name: ordering-db-migration
    spec:
      # Registry secret to authenticate against your private GHCR repository
      imagePullSecrets:
      - name: ghcr-pull-secret
      restartPolicy: OnFailure
      containers:
      - name: migration-runner
        # Aligned to match the exact image name and staging tag built by your updated GitHub Actions workflow
        image: ghcr.io/centallas/orderingsystem-cleanarch-migration:staging
        imagePullPolicy: IfNotPresent
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Staging"
        
        # Database Connection Strings
        - name: ConnectionStrings__DefaultConnection
          value: "Host=rbd-postgres-staging;Database=OrderingDb;Username=postgres;Password=StagingSuperPassword123"
        - name: ConnectionStrings__OrderingDb
          value: "Host=rbd-postgres-staging;Database=OrderingDb;Username=postgres;Password=StagingSuperPassword123"
        
        # MassTransit / RabbitMQ Configuration overrides for Staging Namespace
        - name: EventBus__Host
          value: "rabbitmq-staging"
        - name: EventBus__UserName
          value: "guest"
        - name: EventBus__Password
          value: "guest"
        - name: RabbitMQ__Host
          value: "rabbitmq-staging"
        - name: RabbitMQ__Username
          value: "guest"
        - name: RabbitMQ__Password
          value: "guest"