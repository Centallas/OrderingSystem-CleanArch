apiVersion: batch/v1
kind: Job
metadata:
  name: ordering-db-migration
  namespace: staging
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      name: ordering-db-migration
    spec:
      containers:
      - name: migration-runner
        image: ordering-llm-worker:latest
        imagePullPolicy: IfNotPresent
        command: ["dotnet", "ef", "database", "update"]
        env:
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres-staging;Database=OrderingDb;Username=postgres;Password=your_secure_password;"
      restartPolicy: OnFailure
  backoffLimit: 3