apiVersion: batch/v1
kind: Job
metadata:
  name: ordering-db-migration-v3
  namespace: staging
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-options: Prune=false
spec:
  backoffLimit: 0
  template:
    metadata:
      name: ordering-db-migration-v3
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      restartPolicy: OnFailure
      containers:
      - name: migration-runner
        image: ghcr.io/centallas/orderingsystem-cleanarch-migration:staging
        imagePullPolicy: IfNotPresent
        # THIS IS THE PART TO EDIT:
        command: ["/bin/sh", "-c"]
        args: ["dotnet OrderingSystem.Migrations.dll || sleep 3600"]
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Staging"
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres-staging;Database=OrderingDb;Username=postgres;Password=StagingSuperPassword123"
        - name: ConnectionStrings__OrderingDb
          value: "Host=postgres-staging;Database=OrderingDb;Username=postgres;Password=StagingSuperPassword123"
        - name: EventBus__Host
          value: "rabbitmq-staging"
        - name: EventBus__UserName
          value: "guest"
        - name: EventBus__Password
          value: "guest"
        - name: RabbitMQ__Host
          value: "rabbitmq-staging"
        - name: RabbitMQ__Username
          value: "guest"
        - name: RabbitMQ__Password
          value: "guest"