apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-staging
  namespace: staging
  labels:
    app: rabbitmq-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-staging
  template:
    metadata:
      labels:
        app: rabbitmq-staging
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: "guest"
        - name: RABBITMQ_DEFAULT_PASS
          value: "StagingRabbitPassword123"  # Matches your Secret file!
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-staging-service
  namespace: staging
spec:
  type: ClusterIP
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672
  - name: management
    port: 15672
    targetPort: 15672
  selector:
    app: rabbitmq-staging