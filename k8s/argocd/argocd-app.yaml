apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ordering-system-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Centallas/OrderingSystem-CleanArch.git'
    targetRevision: main
    path: k8s/environments/staging
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m