services:
  # 1. Database (Already have this)
  postgres-db:
    image: postgres:latest
    container_name: ordering-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd123
      POSTGRES_DB: OrderingDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  # 2. Redis (New - Replaces Azure Cache for Redis)
  redis-cache:
    image: redis:latest
    container_name: ordering-redis
    ports:
      - "6379:6379"

  # 3. RabbitMQ (New - Replaces Azure Service Bus)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ordering-rabbitmq
    ports:
      - "5672:5672"   # App connection
      - "15672:15672" # Management Dashboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      
  # 4. LLM Worker Service
  ordering-worker:
    container_name: ordering-worker
    build:
      context: .
      dockerfile: Worker.Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Port=5432;Database=OrderingDb;Username=postgres;Password=P@ssw0rd123
      - Ollama__Endpoint=http://host.docker.internal:11434/v1/
      - "RabbitMQ:Host=rabbitmq"  # Use the colon syntax or RabbitMQ__Host
    depends_on:
      - postgres-db
      - rabbitmq
    networks:
      - default 
  # 5. Api
  ordering-api:
    container_name: ordering-api
    build:
      context: .
      dockerfile: API.Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Port=5432;Database=OrderingDb;Username=postgres;Password=P@ssw0rd123
      - MessageBroker__Host=rabbitmq
      - MessageBroker__Username=guest
      - MessageBroker__Password=guest
    depends_on:
      - postgres-db
      - rabbitmq
volumes:
  postgres_data: