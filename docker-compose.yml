services:
  # 1. Database
  postgres-db:
    image: postgres:17
    container_name: ordering-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd123
      POSTGRES_DB: OrderingDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d OrderingDb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 2. Redis
  redis-cache:
    image: redis:alpine
    container_name: ordering-redis
    restart: always
    ports:
      - "6379:6379"

  # 3. RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ordering-rabbitmq
    hostname: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-kernel os_mon start_os_mon false"
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 30s

  # 4. Ollama
  ollama-local:
    image: ollama/ollama:latest
    container_name: ollama-local
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

# 5. Migration Runner
  migration-runner:
    image: ghcr.io/centallas/orderingsystem-cleanarch-migration:staging
    container_name: ordering-migrations
    working_dir: /app
    entrypoint: [""]
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes:
      - ./src/OrderingSystem.Api/appsettings.Staging.json:/app/appsettings.json:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
    command: ["./efbundle", "--connection", "Host=ordering-postgres;Port=5432;Database=OrderingDb;Username=postgres;Password=P@ssw0rd123"]
    
  # 6. LLM Worker Service
  ordering-worker:
    container_name: ordering-worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: Worker.Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=ordering-postgres;Port=5432;Database=OrderingDb;Username=postgres;Password=P@ssw0rd123
      - Ollama__Endpoint=http://ollama-local:11434/v1
      - Ollama__Model=phi3
      - MessageBroker__Host=rabbitmq
      - MessageBroker__Username=guest
      - MessageBroker__Password=guest
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama-local:
        condition: service_started

  # 7. Api
  ordering-api:
    container_name: ordering-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: API.Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      # Database
      - ConnectionStrings__DefaultConnection=Host=ordering-postgres;Port=5432;Database=OrderingDb;Username=postgres;Password=P@ssw0rd123
      - ConnectionStrings__OrderingDb=Host=ordering-postgres;Port=5432;Database=OrderingDb;Username=postgres;Password=P@ssw0rd123
      # RabbitMQ (Updated to match service key: 'rabbitmq')
      - EventBus__Host=rabbitmq
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - MessageBroker__Host=rabbitmq
      - MessageBroker__Username=guest
      - MessageBroker__Password=guest
      # Redis (Updated to match service key: 'redis-cache')
      - ConnectionStrings__Redis=redis-cache:6379
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-cache:
        condition: service_started

volumes:
  postgres_data:
  ollama_data: