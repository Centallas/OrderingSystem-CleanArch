services:
  # 1. Database (Already have this)
  postgres-db:
    image: postgres:latest
    container_name: ordering-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd123
      POSTGRES_DB: OrderingDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  # 2. Redis (New - Replaces Azure Cache for Redis)
  redis-cache:
    image: redis:latest
    container_name: ordering-redis
    ports:
      - "6379:6379"

  # 3. RabbitMQ (New - Replaces Azure Service Bus)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ordering-rabbitmq
    ports:
      - "5672:5672"   # App connection
      - "15672:15672" # Management Dashboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  postgres_data: