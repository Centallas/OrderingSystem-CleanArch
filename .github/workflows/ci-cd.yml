name: Build, Test, and Deploy

on:
  push:
    branches: [ develop, main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [
          { dockerfile: "API.Dockerfile", image_name: "orderingsystem-cleanarch-api" },
          { dockerfile: "Worker.Dockerfile", image_name: "orderingsystem-cleanarch-worker" },
          { dockerfile: "Migration.Dockerfile", image_name: "orderingsystem-cleanarch-migration" }
        ]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Environment Tag
      id: vars
      run: |
        if [ "${{ github.ref_name }}" = "develop" ]; then
          echo "env_tag=dev" >> $GITHUB_OUTPUT
        elif [ "${{ github.ref_name }}" = "main" ]; then
          echo "env_tag=staging" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "env_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "env_tag=latest" >> $GITHUB_OUTPUT
        fi

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ matrix.service.dockerfile }}
        push: true
        no-cache: true
        tags: |
          ghcr.io/centallas/${{ matrix.service.image_name }}:${{ steps.vars.outputs.env_tag }}

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Staging VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the project directory
            cd /home/your-user/ai-test
            
            # Login to GHCR to ensure we can pull images
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the latest images
            docker compose pull
            
            # Restart the services
            docker compose up -d