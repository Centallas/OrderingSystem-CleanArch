name: Build, Test, and Deploy

on:
  push:
    branches: [ develop, main ]
    tags: [ 'v*.*.*' ] # Kicks off the pipeline when a release tag like v1.0.0 is pushed

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [
          { dockerfile: "API.Dockerfile", image_name: "orderingsystem-cleanarch-api" },
          { dockerfile: "Worker.Dockerfile", image_name: "orderingsystem-cleanarch-worker" },
          { dockerfile: "Migration.Dockerfile", image_name: "orderingsystem-cleanarch-migration" }
        ]

    steps:
    # Step 1: Download the repository code onto the runner    
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up the official .NET SDK environment    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # Step 3: Restore NuGet dependencies
    - name: Restore Dependencies
      run: dotnet restore

    # Step 4: Compile the entire solution to catch build errors
    - name: Build Solution
      run: dotnet build --configuration Release --no-restore

    # Step 5: Run all automated tests in the solution
    - name: Run Tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    # Step 6: Log into GitHub Container Registry (GHCR) instead of Docker Hub
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Step 7: Determine the environment tag based on the branch or tag
    - name: Set Environment Tag
      id: vars
      run: |
        if [ "${{ github.ref_name }}" = "develop" ]; then
          echo "env_tag=dev" >> $GITHUB_OUTPUT
        elif [ "${{ github.ref_name }}" = "main" ]; then
          echo "env_tag=staging" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "env_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "env_tag=latest" >> $GITHUB_OUTPUT
        fi

    # Step 8: Build and Push Docker Images using the Matrix setup to GHCR
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ matrix.service.dockerfile }}
        push: true
        no-cache: true # Guarantees clean re-compilation of updated files without layers caching
        tags: |
          ghcr.io/centallas/${{ matrix.service.image_name }}:${{ steps.vars.outputs.env_tag }}